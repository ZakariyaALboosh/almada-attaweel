      .frame-shell {
        position: relative;
        overflow: hidden;
      }

      .frame-shell::before,
      .frame-shell::after {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
      }

      .frame-shell::before {
        border: 1px solid rgba(255, 255, 255, 0.78);
        border-radius: 1.15rem;
      }

      .frame-shell::after {
        inset: 10px;
        border: 1px solid rgba(14, 116, 144, 0.16);
        border-radius: 0.9rem;
      }
    </style>
  </head>
