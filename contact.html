<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>تواصل معنا | شركة المدى الطويل</title>
    <meta name="description" content="صفحة التواصل مع شركة المدى الطويل." />
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      body {
        font-family: "Tajawal", "Cairo", system-ui, -apple-system, Segoe UI, Roboto, Helvetica, Arial, sans-serif;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(18px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .animate-fade-in {
        opacity: 0;
        animation: fadeIn 0.75s ease-out forwards;
      }

      .delay-1 {
        animation-delay: 0.12s;
      }

      .delay-2 {
        animation-delay: 0.24s;
      }
    </style>
  </head>
  <body class="bg-slate-50 text-slate-800">
    <main class="min-h-screen">
      <section class="mx-auto flex min-h-screen w-full max-w-3xl items-center px-4 py-12 sm:px-6 lg:px-8">
        <div class="w-full rounded-2xl bg-white p-6 text-center shadow-sm ring-1 ring-slate-200 sm:p-10">
          <h1 class="animate-fade-in text-3xl font-bold text-teal-900 sm:text-4xl">تواصل معنا</h1>
          <p class="animate-fade-in delay-1 mx-auto mt-4 max-w-xl text-base leading-8 text-slate-600 sm:text-lg">
            نحن جاهزون للرد على استفساراتكم. يمكنكم التواصل معنا مباشرة عبر البريد الإلكتروني الرسمي للشركة.
          </p>

          <div class="animate-fade-in delay-2 mt-8 flex flex-wrap items-center justify-center gap-3">
            <a
              href="mailto:info@almada-attaweel.ly"
              class="inline-flex items-center justify-center rounded-xl bg-teal-700 px-6 py-3 text-base font-semibold text-white transition duration-300 hover:-translate-y-0.5 hover:bg-teal-800"
              >راسلنا عبر البريد: info@almada-attaweel.ly</a
            >
            <a
              href="https://www.facebook.com/"
              target="_blank"
              rel="noopener noreferrer"
              class="inline-flex items-center justify-center rounded-xl border border-blue-600 bg-blue-600 px-6 py-3 text-base font-semibold text-white transition duration-300 hover:-translate-y-0.5 hover:bg-blue-700"
              >صفحتنا على فيسبوك</a
            >
          </div>

          <div class="mt-6">
            <a href="index.html" class="text-sm font-medium text-teal-800 transition hover:underline">العودة إلى الصفحة الرئيسية</a>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
